services:
  setup:
    build: .
    command: ["./bin/rails", "db:prepare"]
    env_file: .env
    environment:
      - RAILS_ENV=production
    volumes:
      - ./tmp/docker_storage:/rails/storage

  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - RAILS_ENV=production
    volumes:
      - ./tmp/docker_storage:/rails/storage
      - ./tmp/docker_emails:/rails/emails
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    build: .
    command: ["./bin/jobs"]
    env_file: .env
    environment:
      - RAILS_ENV=production
    volumes:
      - ./tmp/docker_storage:/rails/storage
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  mail_fetcher:
    build: .
    command: ["./bin/rails", "frank_fbi:fetch_mail"]
    env_file: .env
    environment:
      - RAILS_ENV=production
      - APP_HOST=http://app:3000
    volumes:
      - ./tmp/docker_storage:/rails/storage
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
