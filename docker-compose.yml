services:
  setup:
    build: .
    command: ["./bin/rails", "db:prepare"]
    env_file: .env
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE_DUMMY=1
    volumes:
      - frank_fbi_db:/rails/db
      - frank_fbi_storage:/rails/storage

  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - RAILS_ENV=production
    volumes:
      - frank_fbi_db:/rails/db
      - frank_fbi_storage:/rails/storage
      - frank_fbi_emails:/rails/emails
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    command: ["./bin/jobs"]
    env_file: .env
    environment:
      - RAILS_ENV=production
    volumes:
      - frank_fbi_db:/rails/db
      - frank_fbi_storage:/rails/storage
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  mail_fetcher:
    build: .
    command: ["./bin/rails", "frank_fbi:fetch_mail"]
    env_file: .env
    environment:
      - RAILS_ENV=production
      - APP_HOST=http://app:3000
    volumes:
      - frank_fbi_db:/rails/db
      - frank_fbi_storage:/rails/storage
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  frank_fbi_db:
    external: true
  frank_fbi_storage:
    external: true
  frank_fbi_emails:
    external: true
