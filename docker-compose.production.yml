name: frank_fbi

services:
  setup:
    image: 192.168.0.90:3007/akitaonrails/frank_fbi:latest
    container_name: frank-fbi-setup
    command: ["./bin/rails", "db:prepare"]
    env_file: /var/opt/docker/frank_fbi/.env
    environment:
      - RAILS_ENV=production
    volumes:
      - /var/opt/docker/frank_fbi/storage:/rails/storage
    security_opt:
      - label:disable
    restart: "no"

  app:
    image: 192.168.0.90:3007/akitaonrails/frank_fbi:latest
    container_name: frank-fbi-app
    env_file: /var/opt/docker/frank_fbi/.env
    environment:
      - RAILS_ENV=production
    volumes:
      - /var/opt/docker/frank_fbi/storage:/rails/storage
      - /var/opt/docker/frank_fbi/emails:/rails/emails
    security_opt:
      - label:disable
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  worker:
    image: 192.168.0.90:3007/akitaonrails/frank_fbi:latest
    container_name: frank-fbi-worker
    command: ["./bin/jobs"]
    env_file: /var/opt/docker/frank_fbi/.env
    environment:
      - RAILS_ENV=production
    volumes:
      - /var/opt/docker/frank_fbi/storage:/rails/storage
    security_opt:
      - label:disable
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: always

  mail_fetcher:
    image: 192.168.0.90:3007/akitaonrails/frank_fbi:latest
    container_name: frank-fbi-mail-fetcher
    command: ["./bin/rails", "frank_fbi:fetch_mail"]
    env_file: /var/opt/docker/frank_fbi/.env
    environment:
      - RAILS_ENV=production
      - APP_HOST=http://frank-fbi-app:3000
    volumes:
      - /var/opt/docker/frank_fbi/storage:/rails/storage
    security_opt:
      - label:disable
    depends_on:
      app:
        condition: service_healthy
    restart: always
